<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة تحقق - احتفال عيد الفطر | هيئة التأمين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Tajawal','system-ui','sans-serif'] } } } }
    </script>
    <style>
        *{font-family:'Tajawal',system-ui,sans-serif}
        .prog-fill{transition:width .5s ease-out}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes slideUp{from{transform:scale(.95) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
        .anim-fade{animation:fadeIn .2s ease}
        .anim-slide{animation:slideUp .2s ease}
        @keyframes pulseU{0%,100%{opacity:1}50%{opacity:.5}}
        .pulse-u{animation:pulseU 1.5s ease-in-out infinite}
        .chk-row{transition:background .15s,transform .1s}
        .chk-row:active{transform:scale(.98)}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-track{background:#f1f1f1;border-radius:8px}
        ::-webkit-scrollbar-thumb{background:#ccc;border-radius:8px}
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useMemo}=React;

/* ======= HELPERS ======= */
const gid=()=>'_'+Math.random().toString(36).substr(2,9);
const KEY='eid-checklist-ia-2026';
const TODAY=(()=>{const d=new Date();d.setHours(0,0,0,0);return d})();

function parseDL(s){
    if(!s)return null;
    const m=s.match(/(\d+)/);
    if(!m)return null;
    return new Date(2026,2,parseInt(m[1]));
}
function daysLeft(dl){const d=parseDL(dl);if(!d)return null;return Math.ceil((d-TODAY)/864e5)}
function dlStatus(dl){
    const dy=daysLeft(dl);
    if(dy===null)return{label:'',color:'',bg:'',urgency:0,icon:''};
    if(dy<0)return{label:'متأخر بـ '+Math.abs(dy)+' يوم',color:'text-red-700',bg:'bg-red-100',icon:'🚨',urgency:4,pulse:true};
    if(dy===0)return{label:'اليوم!',color:'text-red-600',bg:'bg-red-50',icon:'⚡',urgency:3,pulse:true};
    if(dy===1)return{label:'غداً',color:'text-orange-600',bg:'bg-orange-50',icon:'⏰',urgency:2};
    if(dy<=3)return{label:'باقي '+dy+' أيام',color:'text-amber-600',bg:'bg-amber-50',icon:'⚠️',urgency:1};
    return{label:'باقي '+dy+' يوم',color:'text-green-600',bg:'bg-green-50',icon:'✅',urgency:0};
}
const PRI={
    high:{label:'عالية',color:'text-red-600',bg:'bg-red-50',border:'border-red-200',dot:'bg-red-500'},
    medium:{label:'متوسطة',color:'text-amber-600',bg:'bg-amber-50',border:'border-amber-200',dot:'bg-amber-500'},
    low:{label:'منخفضة',color:'text-green-600',bg:'bg-green-50',border:'border-green-200',dot:'bg-green-500'}
};
const TC={
    fayez:{bg:'bg-teal-600',light:'bg-teal-50',text:'text-teal-700',bar:'bg-teal-500'},
    abdulaziz:{bg:'bg-blue-600',light:'bg-blue-50',text:'text-blue-700',bar:'bg-blue-500'},
    shared:{bg:'bg-purple-600',light:'bg-purple-50',text:'text-purple-700',bar:'bg-purple-500'}
};

/* ======= INITIAL DATA ======= */
function makeData(){return[
{id:'fayez',name:'فايز',tasks:[
    {id:gid(),phase:'الإشراف على التوزيعات',phaseDate:'قبل 25 مارس',priority:'high',required:'توزيع 400 هدية للموظفين + 20 هدية VIP على جميع المواقع',notes:'',deadline:'24 مارس',subtasks:[
        {id:gid(),text:'توزيع 110 هدية على مراكز الاتصال',done:false},
        {id:gid(),text:'توزيع 100 هدية في موقع الأمانة',done:false},
        {id:gid(),text:'توزيع 12 هدية في فرع الدمام',done:false},
        {id:gid(),text:'توزيع 12 هدية في فرع جدة',done:false},
        {id:gid(),text:'توزيع 166 هدية في مركز الهيئة الرئيسي',done:false},
        {id:gid(),text:'توزيع 19 هدية VIP في مقر الهيئة',done:false},
        {id:gid(),text:'توزيع 1 هدية VIP في الأمانة',done:false}
    ]},
    {id:gid(),phase:'إصدار تصاريح دخول السيارات',phaseDate:'قبل 23 مارس',priority:'high',required:'تصاريح سيارات الضيافة والهدايا والخشب',notes:'',deadline:'22 مارس',subtasks:[
        {id:gid(),text:'التأكد من تعبئة النماذج المطلوبة',done:false},
        {id:gid(),text:'إرسال النماذج لإدارة البرج',done:false},
        {id:gid(),text:'أخذ الموافقة على التصريح',done:false},
        {id:gid(),text:'إرسال تصريح الدخول للموردين',done:false},
        {id:gid(),text:'التأكد من دخول الموردين بشكل سلس',done:false}
    ]},
    {id:gid(),phase:'توصيل الضيافة للأمانة ومراكز الاتصال',phaseDate:'24 - 25 مارس',priority:'high',required:'توصيل الطاولات والأكل للمواقع',notes:'التنسيق مع أم جود وسعيد',deadline:'25 مارس',subtasks:[
        {id:gid(),text:'التأكد من أم جود وسعيد من توصيل الطاولات قبل الفعالية بيوم',done:false},
        {id:gid(),text:'يوم الفعالية: التأكد من وضع الأكل وإرسال صورة من الموقع',done:false}
    ]},
    {id:gid(),phase:'الإشراف على المنظمين',phaseDate:'25 مارس',priority:'medium',required:'ضمان وصول وتوزيع المنظمين',notes:'',deadline:'25 مارس',subtasks:[
        {id:gid(),text:'التأكد من وصول المنظمين قبل الفعالية بساعتين',done:false},
        {id:gid(),text:'توزيع المنظمين على المواقع بطريقة مناسبة',done:false}
    ]},
    {id:gid(),phase:'التأكد من مكائن الطبخ',phaseDate:'قبل 23 مارس',priority:'high',required:'موافقة البرج على استخدام مكائن الطبخ',notes:'',deadline:'22 مارس',subtasks:[
        {id:gid(),text:'التأكد من البرج أن مكائن الطبخ بالإمكان استخدامها',done:false}
    ]},
    {id:gid(),phase:'التأكد من استخدام مطبخ البرج',phaseDate:'قبل 23 مارس',priority:'medium',required:'موافقة البرج على استخدام المطبخ',notes:'',deadline:'22 مارس',subtasks:[
        {id:gid(),text:'التأكد من إمكانية استخدام مطبخ البرج',done:false}
    ]}
]},
{id:'abdulaziz',name:'عبدالعزيز',tasks:[
    {id:gid(),phase:'الإشراف على فعالية Crystal Maze',phaseDate:'22 - 25 مارس',priority:'high',required:'تجهيز وتشغيل فعالية Crystal Maze بالكامل',notes:'تجربة الغرفة قبل الفعالية بـ 3 أيام',deadline:'25 مارس',subtasks:[
        {id:gid(),text:'التأكد من أن الغرفة كبيرة ومناسبة',done:false},
        {id:gid(),text:'طباعة هوية الفعالية على الغرفة',done:false},
        {id:gid(),text:'تصميم أوراق النقود بهوية الفعالية',done:false},
        {id:gid(),text:'وضع خطة لآلية الربح والفوز',done:false},
        {id:gid(),text:'اقتراح أنواع الهدايا والتأكد من توفيرها من المورد',done:false},
        {id:gid(),text:'تجربة الغرفة قبل الفعالية بـ 3 أيام (22 مارس)',done:false},
        {id:gid(),text:'وضع منظمين وتعليمهم طريقة لعب الفعالية',done:false}
    ]},
    {id:gid(),phase:'الإشراف على الضيافة والقهوجية',phaseDate:'24 - 25 مارس',priority:'high',required:'تجهيز الضيافة وتوفير القهوجية',notes:'التنسيق مع فايز ويحيى',deadline:'25 مارس',subtasks:[
        {id:gid(),text:'المتابعة مع فايز على وضع مكائن الطبخ',done:false},
        {id:gid(),text:'التأكد من تركيب طاولات كوفي بريك وكوكتيل قبل الحدث بيوم',done:false},
        {id:gid(),text:'التأكد من يحيى من توفير قهوجية سعوديين',done:false}
    ]},
    {id:gid(),phase:'الإشراف على Sketch Art',phaseDate:'24 - 25 مارس',priority:'medium',required:'تجهيز وتشغيل ركن Sketch Art',notes:'',deadline:'25 مارس',subtasks:[
        {id:gid(),text:'التأكد من أن الشاشة تعمل بحسب الوصف',done:false},
        {id:gid(),text:'التأكد من تصميم فريق الشاشة بهوية العيد',done:false},
        {id:gid(),text:'التأكد من أن الطباعة فورية',done:false},
        {id:gid(),text:'التأكد من أن تصميم فريق الطباعة بهوية العيد',done:false},
        {id:gid(),text:'توفير فريمات بعدد كافي وأكثر من عدد الحضور',done:false},
        {id:gid(),text:'توفير منظم يشرف عليها ويعرف استخدامها',done:false},
        {id:gid(),text:'توفير مشرف صيانة للاحتياط',done:false}
    ]},
    {id:gid(),phase:'الإشراف على الخدمات اللوجستية',phaseDate:'23 - 24 مارس',priority:'high',required:'تصميم وتركيب جميع العناصر اللوجستية',notes:'',deadline:'24 مارس',subtasks:[
        {id:gid(),text:'التأكد من تصميم وتركيب البوابة الرئيسية',done:false},
        {id:gid(),text:'التأكد من تصميم وتركيب كاونتر الاستقبال',done:false},
        {id:gid(),text:'التأكد من تصميم وتركيب المظاهر الجمالية',done:false},
        {id:gid(),text:'التأكد من تصميم وتوزيع اللوحات الإرشادية',done:false}
    ]},
    {id:gid(),phase:'المتابعة مع المحتوى وفريق التسويق',phaseDate:'16 - 25 مارس',priority:'high',required:'نشر إعلانات الفعالية عبر جميع القنوات',notes:'التنسيق مع أبو فاطمة وأبو إسلام وعبدالله اليابس',deadline:'16 مارس',subtasks:[
        {id:gid(),text:'المتابعة مع أبو فاطمة لتوجيه كتّاب المحتوى لكتابة الإعلانات',done:false},
        {id:gid(),text:'اعتماد الإعلانات من قبل أبو إسلام',done:false},
        {id:gid(),text:'إرسالها لعبدالله اليابس لمخاطبة فريق التسويق للنشر والتعميم',done:false},
        {id:gid(),text:'الإعلان الرئيسي يوم 16 مارس (إيميل / سناب شات / واتساب)',done:false},
        {id:gid(),text:'الإعلان التذكيري الأول يوم 18 مارس (سناب شات / واتساب)',done:false},
        {id:gid(),text:'الإعلان وقت الفعالية يوم 25 مارس (إيميل / سناب شات / واتساب)',done:false}
    ]}
]},
{id:'shared',name:'مهام مشتركة',tasks:[
    {id:gid(),phase:'الإشراف على التركيب — رحلة الزائر',phaseDate:'24 - 25 مارس',priority:'high',required:'مراجعة شاملة للتركيب خطوة بخطوة كرحلة زائر من الدخول حتى الخروج',notes:'مهمة مشتركة بين جميع أعضاء الفريق بما فيهم المشرف',deadline:'24 مارس',subtasks:[
        {id:gid(),text:'الإشراف على التركيب خطوة بخطوة وشرحها كرحلة زائر من الدخول وحتى الخروج',done:false}
    ]}
]}
]}

/* ======= MAIN APP ======= */
function App(){
    const load=()=>{try{const s=localStorage.getItem(KEY);if(s)return JSON.parse(s)}catch(e){}return makeData()};
    const[data,setData]=useState(load);
    const[tab,setTab]=useState('fayez');
    const[admin,setAdmin]=useState(false);
    const[expanded,setExpanded]=useState({});
    const[editing,setEditing]=useState(null);
    const[showPin,setShowPin]=useState(false);
    const[pin,setPin]=useState('');
    const[deleting,setDeleting]=useState(null);
    const[showAlerts,setShowAlerts]=useState(false);

    useEffect(()=>{try{localStorage.setItem(KEY,JSON.stringify(data))}catch(e){}},[data]);

    const person=data.find(p=>p.id===tab);
    const tog=(id)=>setExpanded(p=>{const n={...p};n[id]=n[id]===undefined?false:!n[id];return n});
    const isO=(id)=>expanded[id]!==false;

    const chk=(pId,tId,sId)=>{
        setData(d=>d.map(p=>p.id!==pId?p:{...p,tasks:p.tasks.map(t=>t.id!==tId?t:{...t,subtasks:t.subtasks.map(s=>s.id!==sId?s:{...s,done:!s.done})})}));
    };

    const pct=(pId)=>{
        const p=data.find(d=>d.id===pId);if(!p)return 0;
        const tot=p.tasks.reduce((a,b)=>a+b.subtasks.length,0);
        const dn=p.tasks.reduce((a,b)=>a+b.subtasks.filter(s=>s.done).length,0);
        return tot===0?0:Math.round(dn/tot*100);
    };
    const tP=(t)=>{
        const tot=t.subtasks.length;const dn=t.subtasks.filter(s=>s.done).length;
        return tot===0?0:Math.round(dn/tot*100);
    };

    const urgent=useMemo(()=>{
        const r=[];
        data.forEach(p=>{p.tasks.forEach(t=>{
            if(tP(t)===100)return;
            const st=dlStatus(t.deadline);
            if(st.urgency>=1)r.push({person:p.name,pId:p.id,task:t,status:st,days:daysLeft(t.deadline)});
        })});
        r.sort((a,b)=>(a.days||0)-(b.days||0));
        return r;
    },[data]);

    const doLogin=()=>{if(pin==='1234'){setAdmin(true);setShowPin(false);setPin('')}};
    const doLogout=()=>setAdmin(false);
    const doDel=()=>{if(!deleting)return;setData(d=>d.map(p=>p.id!==deleting.pId?p:{...p,tasks:p.tasks.filter(t=>t.id!==deleting.tId)}));setDeleting(null)};
    const doReset=()=>{if(confirm('هل أنت متأكد من إعادة تعيين جميع البيانات؟')){localStorage.removeItem(KEY);setData(makeData())}};

    const startEdit=(pId,task)=>{
        setEditing({pId,isNew:!task,task:task?JSON.parse(JSON.stringify(task)):{
            id:gid(),phase:'',phaseDate:'',required:'',notes:'',deadline:'',priority:'medium',
            subtasks:[{id:gid(),text:'',done:false}]
        }});
    };
    const saveEdit=()=>{
        if(!editing)return;
        const{pId,isNew,task}=editing;
        setData(d=>d.map(p=>{
            if(p.id!==pId)return p;
            if(isNew)return{...p,tasks:[...p.tasks,task]};
            return{...p,tasks:p.tasks.map(t=>t.id===task.id?task:t)};
        }));
        setEditing(null);
    };
    const uf=(f,v)=>setEditing(e=>({...e,task:{...e.task,[f]:v}}));
    const us=(sId,txt)=>setEditing(e=>({...e,task:{...e.task,subtasks:e.task.subtasks.map(s=>s.id===sId?{...s,text:txt}:s)}}));
    const addS=()=>setEditing(e=>({...e,task:{...e.task,subtasks:[...e.task.subtasks,{id:gid(),text:'',done:false}]}}));
    const rmS=(sId)=>setEditing(e=>({...e,task:{...e.task,subtasks:e.task.subtasks.filter(s=>s.id!==sId)}}));

    const c=TC[tab]||TC.fayez;
    const todayStr=TODAY.getDate()+' مارس '+TODAY.getFullYear();

    return(
    <div className="min-h-screen bg-gradient-to-b from-gray-50 to-gray-100">

        {/* ===== HEADER ===== */}
        <div className="bg-gradient-to-l from-emerald-800 via-teal-800 to-emerald-900 text-white px-4 py-5 shadow-lg">
            <div className="max-w-3xl mx-auto">
                <div className="flex items-center justify-between flex-wrap gap-3">
                    <div>
                        <div className="flex items-center gap-2 mb-1">
                            <i className="fas fa-moon text-yellow-300 text-lg"></i>
                            <h1 className="text-lg font-bold">احتفال عيد الفطر 🎉</h1>
                        </div>
                        <p className="text-emerald-300 text-xs">هيئة التأمين • الثلاثاء 25 مارس • اليوم: {todayStr}</p>
                    </div>
                    <div className="flex items-center gap-2">
                        <button onClick={()=>setShowAlerts(true)} className="relative p-2 rounded-lg bg-white/10 hover:bg-white/20 transition">
                            <i className="fas fa-bell text-white text-sm"></i>
                            {urgent.length>0&&(
                                <span className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-white flex items-center justify-center pulse-u" style={{fontSize:'10px'}}>{urgent.length}</span>
                            )}
                        </button>
                        <button onClick={()=>admin?doLogout():setShowPin(true)}
                            className={"flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-medium transition "+(admin?'bg-yellow-400 text-yellow-900':'bg-white/10 hover:bg-white/20 text-white')}>
                            <i className={"fas text-xs "+(admin?'fa-lock-open':'fa-lock')}></i>
                            {admin?'المشرف':'دخول'}
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div className="max-w-3xl mx-auto px-4 py-4">

            {/* ===== TABS ===== */}
            <div className="flex gap-2 overflow-x-auto pb-1">
                {data.map(p=>(
                    <button key={p.id} onClick={()=>setTab(p.id)}
                        className={"flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-medium transition whitespace-nowrap "+(tab===p.id?TC[p.id].bg+' text-white shadow-md':'bg-white text-gray-500 hover:bg-gray-50 border border-gray-200')}>
                        {p.name}
                        <span className={"text-xs px-1.5 py-0.5 rounded-full "+(tab===p.id?'bg-white/20':'bg-gray-100')}>{pct(p.id)}%</span>
                    </button>
                ))}
            </div>

            {/* ===== PROGRESS BAR ===== */}
            {person&&(
                <div className="mt-3 bg-white rounded-xl p-4 shadow-sm border border-gray-100">
                    <div className="flex items-center justify-between mb-2">
                        <span className={"text-sm font-semibold "+c.text}>نسبة الإنجاز: {pct(tab)}%</span>
                        <span className="text-xs text-gray-400">
                            {person.tasks.reduce((a,t)=>a+t.subtasks.filter(s=>s.done).length,0)} / {person.tasks.reduce((a,t)=>a+t.subtasks.length,0)} مهمة
                        </span>
                    </div>
                    <div className="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
                        <div className={c.bar+" h-2.5 rounded-full prog-fill"} style={{width:pct(tab)+'%'}}></div>
                    </div>
                </div>
            )}

            {/* ===== TASKS ===== */}
            <div className="mt-4 space-y-3 pb-8">
                {person&&person.tasks.map((task,idx)=>{
                    const open=isO(task.id);
                    const tp=tP(task);
                    const ds=dlStatus(task.deadline);
                    const pr=PRI[task.priority||'medium'];
                    const done=tp===100;
                    const strokeColor=done?'#22c55e':tp>0?'#f59e0b':'#d1d5db';

                    return(
                    <div key={task.id} className={"bg-white rounded-xl shadow-sm border overflow-hidden transition-all "+(ds.urgency>=3&&!done?'border-red-300 shadow-red-100':ds.urgency>=2&&!done?'border-orange-200':'border-gray-100')}>

                        {/* TASK HEADER */}
                        <div className="p-4 cursor-pointer hover:bg-gray-50/50 transition" onClick={()=>tog(task.id)}>
                            <div className="flex items-start justify-between gap-3">
                                <div className="flex-1 min-w-0">
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className={c.bg+" w-6 h-6 rounded-full text-white text-xs flex items-center justify-center font-bold flex-shrink-0"}>{idx+1}</span>
                                        <h3 className="font-bold text-gray-800 text-sm leading-relaxed">{task.phase}</h3>
                                    </div>
                                    <div className="flex flex-wrap items-center gap-2 mr-8">
                                        {/* Priority */}
                                        <span className={"inline-flex items-center gap-1 text-xs font-medium px-2 py-1 rounded-full border "+pr.bg+' '+pr.color+' '+pr.border}>
                                            <span className={"w-1.5 h-1.5 rounded-full "+pr.dot}></span>{pr.label}
                                        </span>
                                        {/* Deadline Status */}
                                        <span className={"inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full "+(done?'bg-green-100 text-green-700':ds.bg+' '+ds.color)+(ds.pulse&&!done?' pulse-u':'')}>
                                            {done?'✅ مكتملة':ds.icon+' '+ds.label}
                                        </span>
                                        {/* Deadline Date */}
                                        <span className="inline-flex items-center gap-1 text-xs text-gray-400 px-2 py-1 rounded-full bg-gray-50">
                                            <i className="far fa-clock text-xs"></i> التسليم: {task.deadline}
                                        </span>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2 flex-shrink-0">
                                    {/* Circle Progress */}
                                    <div className="relative w-10 h-10 flex items-center justify-center">
                                        <svg className="absolute inset-0 w-10 h-10" viewBox="0 0 36 36" style={{transform:'rotate(-90deg)'}}>
                                            <circle cx="18" cy="18" r="15.5" fill="none" stroke="#e5e7eb" strokeWidth="2"/>
                                            <circle cx="18" cy="18" r="15.5" fill="none" stroke={strokeColor} strokeWidth="2" strokeDasharray={tp+" "+(100-tp)} strokeLinecap="round"/>
                                        </svg>
                                        <span className={"text-xs font-bold relative "+(done?'text-green-700':tp>0?'text-amber-700':'text-gray-400')}>{tp}%</span>
                                    </div>
                                    <i className={"fas text-gray-300 text-xs "+(open?'fa-chevron-up':'fa-chevron-down')}></i>
                                </div>
                            </div>
                        </div>

                        {/* TASK BODY (expanded) */}
                        {open&&(
                        <div className="px-4 pb-4 border-t border-gray-50 anim-fade">
                            <div className={"mt-3 p-3 rounded-lg text-xs leading-relaxed "+c.light}>
                                <p><span className="font-semibold text-gray-600">📋 المطلوب:</span> <span className="text-gray-700">{task.required}</span></p>
                                {task.notes&&<p className="mt-1"><span className="font-semibold text-gray-600">📝 ملاحظات:</span> <span className="text-gray-700">{task.notes}</span></p>}
                                <p className="mt-1"><span className="font-semibold text-gray-600">📅 الموعد:</span> <span className="text-gray-700">{task.phaseDate}</span></p>
                                <p className="mt-1"><span className="font-semibold text-gray-600">⏰ التسليم:</span> <span className={"font-bold "+ds.color}>{task.deadline} ({ds.label})</span></p>
                            </div>
                            <p className="text-xs font-semibold text-gray-400 mt-3 mb-2">التأكد من:</p>
                            <div className="space-y-1.5">
                                {task.subtasks.map(st=>(
                                    <div key={st.id} onClick={()=>chk(tab,task.id,st.id)}
                                        className={"flex items-start gap-3 p-3 rounded-lg cursor-pointer chk-row "+(st.done?'bg-green-50 hover:bg-green-100/70':'bg-gray-50 hover:bg-gray-100')}>
                                        {st.done
                                            ?<i className="fas fa-circle-check text-green-500 mt-0.5"></i>
                                            :<i className="far fa-circle text-gray-300 mt-0.5"></i>
                                        }
                                        <span className={"text-sm leading-relaxed "+(st.done?'line-through text-gray-400':'text-gray-700')}>{st.text}</span>
                                    </div>
                                ))}
                            </div>
                            {admin&&(
                                <div className="mt-3 flex gap-2 pt-3 border-t border-gray-100">
                                    <button onClick={(e)=>{e.stopPropagation();startEdit(tab,task)}}
                                        className="flex items-center gap-1.5 px-3 py-1.5 text-xs bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition font-medium">
                                        <i className="fas fa-pen text-xs"></i> تعديل
                                    </button>
                                    <button onClick={(e)=>{e.stopPropagation();setDeleting({pId:tab,tId:task.id})}}
                                        className="flex items-center gap-1.5 px-3 py-1.5 text-xs bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition font-medium">
                                        <i className="fas fa-trash text-xs"></i> حذف
                                    </button>
                                </div>
                            )}
                        </div>
                        )}
                    </div>
                    );
                })}

                {admin&&(
                    <div className="space-y-2">
                        <button onClick={()=>startEdit(tab,null)}
                            className="w-full p-4 border-2 border-dashed border-gray-300 rounded-xl text-gray-400 hover:text-gray-600 hover:border-gray-400 hover:bg-white transition flex items-center justify-center gap-2 text-sm font-medium">
                            <i className="fas fa-plus"></i> إضافة مهمة جديدة
                        </button>
                        <button onClick={doReset}
                            className="w-full p-3 text-xs text-gray-300 hover:text-red-400 transition flex items-center justify-center gap-2">
                            <i className="fas fa-rotate-right"></i> إعادة تعيين جميع البيانات
                        </button>
                    </div>
                )}
            </div>
        </div>

        {/* ===== ALERTS MODAL ===== */}
        {showAlerts&&(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 anim-fade" onClick={()=>setShowAlerts(false)}>
            <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden anim-slide" onClick={e=>e.stopPropagation()}>
                <div className="p-5 border-b border-gray-100 flex items-center justify-between bg-gradient-to-l from-red-50 to-orange-50">
                    <div className="flex items-center gap-2">
                        <i className="fas fa-bell text-red-500"></i>
                        <h3 className="text-base font-bold text-gray-800">تنبيهات المواعيد</h3>
                        <span className="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-bold">{urgent.length}</span>
                    </div>
                    <button onClick={()=>setShowAlerts(false)} className="text-gray-400 hover:text-gray-600"><i className="fas fa-xmark text-lg"></i></button>
                </div>
                <div className="p-4 space-y-2 max-h-96 overflow-y-auto">
                    {urgent.length===0?(
                        <div className="text-center py-8 text-gray-400 text-sm">🎉 لا توجد تنبيهات عاجلة</div>
                    ):(
                        urgent.map((item,i)=>(
                        <div key={i} className={"p-3 rounded-xl border "+(item.status.urgency>=3?'bg-red-50 border-red-200':item.status.urgency>=2?'bg-orange-50 border-orange-200':'bg-amber-50 border-amber-200')}>
                            <div className="flex items-start justify-between gap-2">
                                <div className="flex-1 min-w-0">
                                    <p className="text-sm font-bold text-gray-800 leading-relaxed">{item.task.phase}</p>
                                    <p className="text-xs text-gray-500 mt-0.5">👤 {item.person} • التسليم: {item.task.deadline}</p>
                                </div>
                                <span className={"text-xs font-bold px-2 py-1 rounded-full whitespace-nowrap "+item.status.bg+' '+item.status.color}>
                                    {item.status.icon} {item.status.label}
                                </span>
                            </div>
                            <div className="mt-2 w-full bg-white/60 rounded-full h-1.5">
                                <div className={"h-1.5 rounded-full "+(item.status.urgency>=3?'bg-red-400':item.status.urgency>=2?'bg-orange-400':'bg-amber-400')}
                                    style={{width:tP(item.task)+'%'}}></div>
                            </div>
                            <p className="text-xs text-gray-400 mt-1">الإنجاز: {tP(item.task)}%</p>
                        </div>
                        ))
                    )}
                </div>
            </div>
        </div>
        )}

        {/* ===== PIN MODAL ===== */}
        {showPin&&(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 anim-fade" onClick={()=>{setShowPin(false);setPin('')}}>
            <div className="bg-white rounded-2xl p-6 w-full max-w-xs shadow-2xl anim-slide" onClick={e=>e.stopPropagation()}>
                <h3 className="text-lg font-bold text-gray-800 mb-1">🔐 دخول المشرف</h3>
                <p className="text-xs text-gray-400 mb-4">أدخل الرمز للتعديل على المهام</p>
                <input type="password" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()}
                    placeholder="رمز الدخول" className="w-full border border-gray-200 rounded-xl px-4 py-3 text-center text-lg tracking-widest focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent" autoFocus/>
                <button onClick={doLogin} className="w-full mt-3 bg-teal-600 text-white py-3 rounded-xl font-medium hover:bg-teal-700 transition text-sm">دخول</button>
                <p className="text-xs text-gray-300 text-center mt-2">الرمز: 1234</p>
            </div>
        </div>
        )}

        {/* ===== DELETE MODAL ===== */}
        {deleting&&(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 anim-fade" onClick={()=>setDeleting(null)}>
            <div className="bg-white rounded-2xl p-6 w-full max-w-xs shadow-2xl anim-slide" onClick={e=>e.stopPropagation()}>
                <h3 className="text-base font-bold text-red-600 mb-2">⚠️ تأكيد الحذف</h3>
                <p className="text-sm text-gray-600 mb-4">هل أنت متأكد؟ لا يمكن التراجع.</p>
                <div className="flex gap-2">
                    <button onClick={doDel} className="flex-1 bg-red-600 text-white py-2.5 rounded-xl text-sm font-medium hover:bg-red-700 transition">حذف</button>
                    <button onClick={()=>setDeleting(null)} className="flex-1 bg-gray-100 text-gray-600 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-200 transition">إلغاء</button>
                </div>
            </div>
        </div>
        )}

        {/* ===== EDIT/ADD MODAL ===== */}
        {editing&&(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 anim-fade" onClick={()=>setEditing(null)}>
            <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden anim-slide" onClick={e=>e.stopPropagation()}>
                <div className="max-h-screen overflow-y-auto p-6">
                    <div className="flex items-center justify-between mb-5">
                        <h3 className="text-base font-bold text-gray-800">{editing.isNew?'➕ مهمة جديدة':'✏️ تعديل المهمة'}</h3>
                        <button onClick={()=>setEditing(null)} className="text-gray-400 hover:text-gray-600"><i className="fas fa-xmark text-lg"></i></button>
                    </div>
                    <div className="space-y-3">
                        <div>
                            <label className="block text-xs font-medium text-gray-500 mb-1">المرحلة</label>
                            <input value={editing.task.phase} onChange={e=>uf('phase',e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"/>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className="block text-xs font-medium text-gray-500 mb-1">موعدها</label>
                                <input value={editing.task.phaseDate} onChange={e=>uf('phaseDate',e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"/>
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-gray-500 mb-1">موعد التسليم</label>
                                <input value={editing.task.deadline} onChange={e=>uf('deadline',e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"/>
                            </div>
                        </div>
                        <div>
                            <label className="block text-xs font-medium text-gray-500 mb-2">الأولوية</label>
                            <div className="flex gap-2">
                                {Object.entries(PRI).map(([k,v])=>(
                                    <button key={k} onClick={()=>uf('priority',k)}
                                        className={"flex-1 py-2.5 rounded-xl text-xs font-medium border-2 transition "+(editing.task.priority===k?v.bg+' '+v.color+' '+v.border:'bg-gray-50 text-gray-400 border-gray-200 hover:bg-gray-100')}>
                                        <span className={"inline-block w-2 h-2 rounded-full ml-1.5 "+(editing.task.priority===k?v.dot:'bg-gray-300')}></span>
                                        {v.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div>
                            <label className="block text-xs font-medium text-gray-500 mb-1">المطلوب</label>
                            <textarea value={editing.task.required} onChange={e=>uf('required',e.target.value)} rows={2} className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 resize-none"/>
                        </div>
                        <div>
                            <label className="block text-xs font-medium text-gray-500 mb-1">ملاحظات عامة</label>
                            <textarea value={editing.task.notes} onChange={e=>uf('notes',e.target.value)} rows={2} className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 resize-none"/>
                        </div>
                        <div>
                            <label className="block text-xs font-medium text-gray-500 mb-2">قائمة التحقق (التأكد من)</label>
                            <div className="space-y-2">
                                {editing.task.subtasks.map((st,i)=>(
                                    <div key={st.id} className="flex items-center gap-2">
                                        <span className="text-xs text-gray-300 w-4 text-center">{i+1}</span>
                                        <input value={st.text} onChange={e=>us(st.id,e.target.value)} placeholder="وصف البند..."
                                            className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"/>
                                        {editing.task.subtasks.length>1&&(
                                            <button onClick={()=>rmS(st.id)} className="text-red-300 hover:text-red-500 transition">
                                                <i className="fas fa-xmark"></i>
                                            </button>
                                        )}
                                    </div>
                                ))}
                            </div>
                            <button onClick={addS} className="mt-2 flex items-center gap-1 text-xs text-teal-600 hover:text-teal-700 font-medium">
                                <i className="fas fa-plus text-xs"></i> إضافة بند
                            </button>
                        </div>
                    </div>
                    <div className="flex gap-2 mt-6">
                        <button onClick={saveEdit} className="flex-1 bg-teal-600 text-white py-3 rounded-xl text-sm font-medium hover:bg-teal-700 transition flex items-center justify-center gap-2">
                            <i className="fas fa-floppy-disk"></i> حفظ
                        </button>
                        <button onClick={()=>setEditing(null)} className="flex-1 bg-gray-100 text-gray-600 py-3 rounded-xl text-sm font-medium hover:bg-gray-200 transition">إلغاء</button>
                    </div>
                </div>
            </div>
        </div>
        )}

    </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
